specVersion: "2.0"  # 来源：元信息
service: order_service  # 来源：元信息
status: ready  # 来源：元信息

documentRole:  # 来源：需求
  value: order_service 行为规格，供 schema、实现代码和测试样例生成使用  # 来源：需求

sourceLegend:  # 来源：元信息
  requirement: 直接来自业务需求或用户补充规则  # 来源：元信息
  schema: 直接来自 blueprint/schema/order_service.yaml  # 来源：元信息
  guideline: 直接来自 QWireGuideline/guideline/project-guideline.md  # 来源：元信息
  engineering: 为便于实现、测试与维护而增加的工程化设计  # 来源：元信息


apiContract:  # 来源：schema
  createOrder:  # 来源：schema
    endpoint: POST /order  # 来源：schema
    requestModel:  # 来源：schema
      value: OrderCreateRequest  # 来源：schema
    requestHeader:  # 来源：需求
      X-Mock-Signature: 模拟签名 Header，用于演示 TransportProcessor 处理流程，不做真实校验  # 来源：需求
    responses:  # 来源：schema
      - statusCode: 200  # 来源：需求
        when: 请求通过校验，支付处理完成（成功或业务失败均落库并返回）  # 来源：需求
        responseModel: OrderCreateResponse  # 来源：schema
        paymentStatusValues:  # 来源：需求
          - PAID：支付成功，响应中不得出现 failReason 字段（即使为空值或 null）  # 来源：需求
          - FAILED：业务失败，failReason 必须存在且非空；cardNumber 以 5 开头时 failReason=余额不足  # 来源：需求
      - statusCode: 400  # 来源：需求
        when:  # 来源：需求
          - cardNumber 以 4 开头，视为卡片无效，detail=Invalid card number  # 来源：需求
          - currency 非法，detail=Invalid currency  # 来源：需求
        responseModel: ErrorResponse  # 来源：schema
        detailOnly: true  # 来源：需求
        note: 请求无法被处理，不落库  # 来源：需求
      - statusCode: 405  # 来源：需求
        when: 请求方法不支持  # 来源：需求
        responseModel: ErrorResponse  # 来源：schema
        detail: Method Not Allowed  # 来源：需求
        detailOnly: true  # 来源：需求
      - statusCode: 409  # 来源：需求
        when: 同一 merchantId 下 reference 已存在  # 来源：需求
        responseModel: ErrorResponse  # 来源：schema
        detail: Duplicate order  # 来源：需求
        detailOnly: true  # 来源：需求
        note: 请求无法被处理，不落库  # 来源：需求
      - statusCode: 422  # 来源：需求
        when: Payload 校验失败（缺少必填字段或格式错误）  # 来源：需求
        responseModel: ErrorResponse  # 来源：schema
        detail: Invalid request  # 来源：需求
        detailOnly: true  # 来源：需求
      - statusCode: 500  # 来源：需求
        when: 系统内部异常  # 来源：需求
        responseModel: ErrorResponse  # 来源：schema
        detail: Internal Server Error  # 来源：需求
        detailOnly: true  # 来源：需求

  queryOrder:  # 来源：schema
    endpoint: GET /order  # 来源：schema
    description: 支持按 reference+merchantId 或 orderId+merchantId 两种方式查询  # 来源：需求
    queryModes:  # 来源：需求
      - mode: byReference  # 来源：需求
        params: [reference, merchantId]  # 来源：需求
      - mode: byOrderId  # 来源：需求
        params: [orderId, merchantId]  # 来源：需求
    responses:  # 来源：schema
      - statusCode: 200  # 来源：需求
        when: 查询条件匹配到订单  # 来源：需求
        responseModel: OrderQueryResponse  # 来源：schema
        sensitiveFieldPolicy: cardNumber 掩码返回，不返回 cvv、expiry、cardholderName  # 来源：需求
      - statusCode: 404  # 来源：需求
        when: 订单不存在  # 来源：需求
        responseModel: ErrorResponse  # 来源：schema
        detail: Order not exist  # 来源：需求
        detailOnly: true  # 来源：需求
      - statusCode: 405  # 来源：需求
        when: 请求方法不支持  # 来源：需求
        responseModel: ErrorResponse  # 来源：schema
        detail: Method Not Allowed  # 来源：需求
        detailOnly: true  # 来源：需求
      - statusCode: 422  # 来源：需求
        when: 查询参数校验失败  # 来源：需求
        responseModel: ErrorResponse  # 来源：schema
        detailOnly: true  # 来源：需求
      - statusCode: 500  # 来源：需求
        when: 系统内部异常  # 来源：需求
        responseModel: ErrorResponse  # 来源：schema
        detail: Internal Server Error  # 来源：需求
        detailOnly: true  # 来源：需求

persistence:  # 来源：需求
  orderRecord:  # 来源：需求
    value: 订单主数据必须持久化到 DB  # 来源：需求
  productRecord:  # 来源：需求
    value: 商品明细必须持久化到 DB  # 来源：需求
  storageBackend:  # 来源：需求
    value: DB 类型由实现决定，当前默认按关系型数据库设计  # 来源：需求
  sensitiveDataPolicy:  # 来源：需求
    value: 数据库中不得存储 cvv、expiry、cardholderName；cardNumber 以掩码形式存储  # 来源：需求

dataProtection:  # 来源：需求
  sensitiveFields:  # 来源：需求
    forbidden: [cvv, expiry, cardholderName]  # 来源：需求
    scope:  # 来源：需求
      - 数据库存储层：不得写入 cvv、expiry、cardholderName  # 来源：需求
      - 接口响应（创建、查询）：不得返回 cvv、expiry、cardholderName  # 来源：需求
      - 日志：不得打印 cvv、expiry、cardholderName 的值  # 来源：需求
  cardNumberMasking:  # 来源：需求
    - rule: cardNumber 在所有响应和数据库中均以掩码形式出现（前 6 后 4，中间 * 遮盖）  # 来源：需求
  failReason:  # 来源：需求
    - rule: 业务失败时（paymentStatus=FAILED）响应中必须包含非空 failReason  # 来源：需求
    - rule: 支付成功时（paymentStatus=PAID）响应中不得出现 failReason 字段，包括空值和 null  # 来源：需求
  errorResponse:  # 来源：需求
    - rule: HTTP 错误响应仅返回 {"detail": "..."} 结构，不暴露内部校验细节  # 来源：需求

statusFlow:  # 来源：需求
  - stage: payment_success  # 来源：需求
    paymentStatus: PAID  # 来源：需求
    orderStatus: PROCESSING  # 来源：需求
    callbackEvent: ORDER_PAID  # 来源：需求
    trigger: 支付处理成功后立即触发  # 来源：需求
    callbackRequired: true  # 来源：需求
    callbackTarget: Merchant Service POST /callback  # 来源：需求
  - stage: delivery_complete  # 来源：需求
    paymentStatus: PAID  # 来源：需求
    orderStatus: DELIVERED  # 来源：需求
    callbackEvent: ORDER_DELIVERED  # 来源：需求
    trigger: 支付成功后约 30 秒，后台调度器推进  # 来源：需求
    callbackRequired: true  # 来源：需求
    callbackTarget: Merchant Service POST /callback  # 来源：需求

callbackPolicy:  # 来源：需求
  value: order_service 在 paymentStatus 或 orderStatus 发生变化时必须向商户服务发送回调  # 来源：需求
  rule: 每次状态变化触发且仅触发一次回调，回调目标为 Merchant Service POST /callback  # 来源：需求

implementationNotes:  # 来源：engineering
  - note: 错误响应结构、错误码清单和示例以 blueprint/schema/order_service.yaml 中的 components.responses / components.schemas 为准  # 来源：schema
  - note: 可通过后台调度器驱动 30s 状态推进  # 来源：engineering
  - note: 查询接口返回的数据需与持久化状态保持一致  # 来源：engineering
  - note: 模拟签名 Header（X-Mock-Signature）由 TransportProcessor 在请求发送前注入，不做服务端校验  # 来源：需求

validationChecklist:  # 来源：需求
  - item: POST /order 支付成功返回 200 + OrderCreateResponse（paymentStatus=PAID）  # 来源：需求
  - item: POST /order 业务失败返回 200 + OrderCreateResponse（paymentStatus=FAILED + failReason）  # 来源：需求
  - item: POST /order 卡号格式非法返回 400 + ErrorResponse（detail=Invalid card number）  # 来源：需求
  - item: POST /order 币种非法返回 400 + ErrorResponse（detail=Invalid currency）  # 来源：需求
  - item: POST /order reference 重复返回 409 + ErrorResponse（detail=Duplicate order）  # 来源：需求
  - item: POST /order payload 校验失败返回 422 + ErrorResponse  # 来源：需求
  - item: GET /order 按 reference+merchantId 查询成功返回 200 + OrderQueryResponse  # 来源：需求
  - item: GET /order 按 orderId+merchantId 查询成功返回 200 + OrderQueryResponse  # 来源：需求
  - item: GET /order 订单不存在返回 404 + ErrorResponse（detail=Order not exist）  # 来源：需求
  - item: 查询响应中 cardNumber 已掩码，无 cvv/expiry/cardholderName  # 来源：需求
  - item: 支付成功 30 秒后 orderStatus 变为 DELIVERED 并触发回调  # 来源：需求
  - item: 支付成功后立即触发 ORDER_PAID 回调  # 来源：需求
  - item: cardNumber 以 5 开头时返回 200 + paymentStatus=FAILED + failReason=余额不足  # 来源：需求
  - item: paymentStatus=PAID 的响应中不存在 failReason 字段（包括 null/空）  # 来源：需求
  - item: 响应、数据库、日志中均不出现 cvv、expiry、cardholderName  # 来源：需求

databaseConnection:  # 来源：需求
  host: localhost  # 来源：需求
  port: 3306  # 来源：需求
  user: qwire  # 来源：需求
  password: Qwire2026  # 来源：需求
  database: qwire  # 来源：需求
