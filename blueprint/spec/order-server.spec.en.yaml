specVersion: "2.0"  # 来源：元信息
service: order_server  # 来源：元信息
status: ready  # 来源：元信息

documentRole:  # 来源：需求
  value: order_server behavior spec, for schema, implementation code and test case generation  # 来源：需求

sourceLegend:  # 来源：元信息
  requirement: Direct from business requirement or user supplementary rules  # 来源：元信息
  schema: Direct from blueprint/schema/order_server.yaml  # 来源：元信息
  guideline: Direct from QWireGuideline/guideline/project-guideline.md  # 来源：元信息
  engineering: Engineering design enhancements for implementation, testing and maintenance  # 来源：元信息

apiContract:  # 来源：schema
  createOrder:  # 来源：schema
    endpoint: POST /order  # 来源：schema
    requestModel:  # 来源：schema
      value: OrderRequest  # 来源：schema
    responses:  # 来源：schema
      - statusCode: 201  # 来源：需求
        when: Request is valid and payment successful  # 来源：需求
        responseModel: OrderResponse  # 来源：需求
        orderStatus: SUCCESS  # 来源：需求
        productStatus: PROCESSING  # 来源：需求
      - statusCode: 400  # 来源：需求
        when:  # 来源：需求
          - cardNumber starts with 4, triggers business failure, `failReason=Card invalid`  # 来源：需求
          - cardNumber starts with 5, triggers business failure, `failReason=Insufficient balance`  # 来源：需求
        responseModel: OrderBusinessFailureResponse  # 来源：需求
        orderStatus: FAIL  # 来源：需求
        failReasonRequired: true  # 来源：需求
      - statusCode: 409  # 来源：guideline
        when: reference already exists, constituting duplicate submission or resource conflict  # 来源：guideline
        responseModel: HttpErrorResponse  # 来源：guideline
        codeDetailOnly: true  # 来源：guideline
      - statusCode: 422  # 来源：guideline
        when: Request body basic validation failed  # 来源：guideline
        responseModel: HttpErrorResponse  # 来源：guideline
        codeDetailOnly: true  # 来源：guideline

  queryOrder:  # 来源：schema
    endpoint: GET /order?reference={uuid}  # 来源：schema
    responses:  # 来源：schema
      - statusCode: 200  # 来源：schema
        when: reference exists  # 来源：schema
        responseModel: OrderResponse  # 来源：schema
      - statusCode: 422  # 来源：guideline
        when: reference is not a valid UUID  # 来源：guideline
        responseModel: HttpErrorResponse  # 来源：guideline
        codeDetailOnly: true  # 来源：guideline
      - statusCode: 404  # 来源：guideline
        when: reference does not exist  # 来源：guideline
        responseModel: HttpErrorResponse  # 来源：guideline
        codeDetailOnly: true  # 来源：guideline

persistence:  # 来源：需求
  orderRecord:  # 来源：需求
    value: Order master data must be persisted to database  # 来源：需求
  productRecord:  # 来源：需求
    value: Product details must be persisted to database  # 来源：需求
  storageBackend:  # 来源：需求
    value: Database type is implementation decision, currently defaults to relational database design  # 来源：需求

dataProtection:  # 来源：需求
  masking:  # 来源：需求
    - rule: cardNumber in responses must display first 6 and last 4  # 来源：需求
    - rule: cvv and expiry must not appear in any order response or callback data  # 来源：需求
    - rule: HTTP error responses return only generic `code + detail`, must not expose internal validation details or debug information  # 来源：guideline
  failReason:  # 来源：需求
    - rule: Failure scenarios uniformly return FAIL + failReason  # 来源：需求
    - rule: Success scenarios do not return failReason  # 来源：工程补充

statusFlow:  # 来源：需求
  - stage: create_success  # 来源：需求
    orderStatus: SUCCESS  # 来源：需求
    productStatus: PROCESSING  # 来源：需求
    callbackEvent: ORDER_SUCCESS  # 来源：需求
    trigger: Triggered immediately after successful order creation  # 来源：需求
  - stage: shipping_progress  # 来源：需求
    orderStatus: SUCCESS  # 来源：需求
    productStatus: SHIPPED  # 来源：需求
    callbackEvent: ORDER_SHIPPED  # 来源：需求
    trigger: About 30 seconds after creation  # 来源：需求
  - stage: delivery_progress  # 来源：需求
    orderStatus: SUCCESS  # 来源：需求
    productStatus: DELIVERED  # 来源：需求
    callbackEvent: ORDER_DELIVERED  # 来源：需求
    trigger: About 60 seconds after creation  # 来源：需求
  - stage: order_complete  # 来源：需求
    orderStatus: COMPLETED  # 来源：需求
    productStatus: DELIVERED  # 来源：需求
    callbackEvent: ORDER_COMPLETED  # 来源：需求
    trigger: After all products are DELIVERED  # 来源：需求

callbackPolicy:  # 来源：需求
  value: order_server must trigger ORDER_* callbacks on successful creation and critical status changes  # 来源：需求

implementationNotes:  # 来源：工程补充
  - note: Error response structure definitions, error code list and examples are per `components.responses` / `components.schemas` in `blueprint/schema/order_server.yaml`  # 来源：schema
  - note: 30s / 60s status progression can be driven by scheduler or background tasks  # 来源：工程补充
  - note: Query interface returned data must be consistent with persisted state  # 来源：工程补充
  - note: All HTTP error responses' `detail` must use generic publicly available information, must not expose internal exceptions, validation paths or debug details  # 来源：guideline

validationChecklist:  # 来源：需求
  - item: POST /order successful returns 201 + OrderResponse  # 来源：schema
  - item: Card starting with 4 returns 400 + FAIL + `failReason=Card invalid`  # 来源：需求
  - item: Card starting with 5 returns 400 + FAIL + `failReason=Insufficient balance`  # 来源：需求
  - item: reference conflict returns 409 + HttpErrorResponse  # 来源：guideline
  - item: GET /order invalid UUID returns 422 + HttpErrorResponse  # 来源：guideline
  - item: GET /order non-existing reference returns 404 + HttpErrorResponse  # 来源：guideline
  - item: Response has cardNumber masked and no cvv/expiry  # 来源：需求
  - item: Order status SUCCESS → COMPLETED, product status PROCESSING → SHIPPED → DELIVERED  # 来源：需求

schemaSyncNotes:  # 来源：工程补充
  - item: Card number prefix business rules (4* / 5*) and corresponding failReason values have been moved from schema to this spec  # 来源：工程补充
  - item: failReason dictionary:  `Card invalid` (4* card), `Insufficient balance` (5* card)  # 来源：需求
