specVersion: "2.0"  # 来源：元信息
service: callback_server  # 来源：元信息
status: ready  # 来源：元信息

documentRole:  # 来源：需求
  value: callback_server behavior spec, for schema, implementation code and test case generation  # 来源：需求

sourceLegend:  # 来源：元信息
  requirement: Direct from business requirement or user supplementary rules  # 来源：元信息
  schema: Direct from blueprint/schema/callback_server.yaml  # 来源：元信息
  guideline: Direct from QWireGuideline/guideline/project-guideline.md  # 来源：元信息
  engineering: Engineering design enhancements for implementation, testing and logging  # 来源：元信息

apiContract:  # 来源：schema
  receiveCallback:  # 来源：schema
    endpoint: POST /callback  # 来源：schema
    requestModel:  # 来源：schema
      value: OrderResponse  # 来源：schema
    responses:  # 来源：schema
      - statusCode: 200  # 来源：需求
        when: Request body passes validation  # 来源：需求
        action:  # 来源：需求
          - Write data to in-memory cache  # 来源：需求
          - Write request content to log  # 来源：需求
        responseModel: Received  # 来源：需求
      - statusCode: 400  # 来源：guideline
        when: Request body does not conform to OrderResponse or missing required fields  # 来源：guideline
        responseModel: HttpErrorResponse  # 来源：guideline
        codeDetailOnly: true  # 来源：guideline

  checkCallback:  # 来源：schema
    endpoint: GET /check?reference={uuid}  # 来源：schema
    responses:  # 来源：schema
      - statusCode: 200  # 来源：需求
        when: reference is valid UUID and record exists in memory  # 来源：需求
        responseModel: OrderResponse  # 来源：需求
      - statusCode: 404  # 来源：guideline
        when: reference is valid UUID but record not found  # 来源：guideline
        responseModel: HttpErrorResponse  # 来源：guideline
        codeDetailOnly: true  # 来源：guideline
      - statusCode: 422  # 来源：guideline
        when: reference is not a valid UUID  # 来源：guideline
        responseModel: HttpErrorResponse  # 来源：guideline
        codeDetailOnly: true  # 来源：guideline

storagePolicy:  # 来源：需求
  callbackCache:  # 来源：需求
    value: callback data stored in memory only  # 来源：需求
  persistence:  # 来源：需求
    value: No database persistence  # 来源：需求
  logging:  # 来源：需求
    value: Received callback data and query results must be output to readable logs  # 来源：需求

payloadRules:  # 来源：需求
  - rule: Callback data structure must conform to OrderResponse  # 来源：需求
  - rule: cardNumber should remain masked, and must not include cvv or expiry  # 来源：需求
  - rule: status field uses uppercase strings, consistent with order_server  # 来源：需求
  - rule: HTTP error responses return only generic `code + detail`, must not return internal validation details or `errors` field  # 来源：guideline

interactionRules:  # 来源：需求
  - rule: After POST validation succeeds, write to memory first, then return 200  # 来源：需求
  - rule: GET /check only queries memory by reference, does not access database  # 来源：需求
  - rule: When memory has no record, return 404, not empty 200  # 来源：需求

validationChecklist:  # 来源：需求
  - item: POST /callback valid OrderResponse returns 200 + Received  # 来源：需求
  - item: POST /callback invalid payload returns 400 + HttpErrorResponse  # 来源：需求
  - item: GET /check invalid UUID returns 422  # 来源：需求
  - item: GET /check existing reference returns 200 + OrderResponse  # 来源：需求
  - item: GET /check non-existing reference returns 404  # 来源：需求
