specVersion: "2.0"  # 来源：元信息
service: callback_service  # 来源：元信息
status: ready  # 来源：元信息

documentRole:  # 来源：需求
  value: callback_service 行为规格，供 schema、实现代码和测试样例生成使用  # 来源：需求

sourceLegend:  # 来源：元信息
  requirement: 直接来自业务需求或用户补充规则  # 来源：元信息
  schema: 直接来自 blueprint/schema/callback_service.yaml  # 来源：元信息
  guideline: 直接来自 QWireGuideline/guideline/project-guideline.md  # 来源：元信息
  engineering: 为便于实现、测试与日志审计而增加的工程化设计  # 来源：元信息


apiContract:  # 来源：schema
  receiveCallback:  # 来源：schema
    endpoint: POST /callback  # 来源：schema
    requestModel:  # 来源：schema
      value: OrderCallbackRequest  # 来源：schema
    responses:  # 来源：schema
      - statusCode: 200  # 来源：需求
        when: 请求体通过校验  # 来源：需求
        action:  # 来源：需求
          - 将回调数据写入内存，按 orderId 索引  # 来源：需求
          - 将请求内容写入日志  # 来源：需求
        responseModel: CallbackAckResponse  # 来源：schema
        responseExample:  # 来源：需求
          status: SUCCESS  # 来源：需求
      - statusCode: 400  # 来源：需求
        when: 请求体不符合 OrderCallbackRequest 或缺少必填字段  # 来源：需求
        responseModel: ErrorResponse  # 来源：schema
        detailOnly: true  # 来源：需求

  getLatestCallback:  # 来源：schema
    endpoint: GET /callback/latest  # 来源：schema
    queryParam: orderId（UUID 格式）  # 来源：需求
    description: 查询指定订单最近一次收到的回调，查询成功后清除该订单的已查询回调记录  # 来源：需求
    responses:  # 来源：schema
      - statusCode: 200  # 来源：需求
        when: orderId 为合法 UUID 且内存中存在回调记录  # 来源：需求
        responseModel: OrderCallbackQueryResponse  # 来源：schema
        postQueryBehavior: 清除该 orderId 对应的已查询回调记录  # 来源：需求
      - statusCode: 404  # 来源：需求
        when: orderId 为合法 UUID 但不存在回调记录  # 来源：需求
        responseModel: ErrorResponse  # 来源：schema
        detail: Callback not found.  # 来源：需求
        detailOnly: true  # 来源：需求
      - statusCode: 422  # 来源：需求
        when: orderId 不是合法 UUID 格式  # 来源：需求
        responseModel: ErrorResponse  # 来源：schema
        detail: Invalid request  # 来源：需求
        detailOnly: true  # 来源：需求

storagePolicy:  # 来源：需求
  callbackCache:  # 来源：需求
    value: 回调数据仅保存在内存中，按 orderId 索引  # 来源：需求
  persistence:  # 来源：需求
    value: 不做 DB 持久化  # 来源：需求
  clearAfterQuery:  # 来源：需求
    value: GET /callback/latest 成功返回后，清除该 orderId 对应的已查询回调记录，以便后续检测重复回调  # 来源：需求
  logging:  # 来源：需求
    value: 收到的 callback 数据和查询结果都需输出到可阅读日志中  # 来源：需求

payloadRules:  # 来源：需求
  - rule: 回调请求数据结构必须符合 OrderCallbackRequest  # 来源：需求
  - rule: paymentStatus 与 orderStatus 字段使用大写字符串，与 order_service 保持一致  # 来源：需求
  - rule: HTTP 错误响应仅返回 {"detail": "..."} 结构，不得返回内部校验明细  # 来源：需求
  - rule: 回调数据和日志中不得出现 cvv、expiry、cardholderName 字段  # 来源：需求

interactionRules:  # 来源：需求
  - rule: POST 校验成功后先写内存（按 orderId 索引），再返回 200  # 来源：需求
  - rule: GET /callback/latest 仅按 orderId 从内存查询，不访问 DB  # 来源：需求
  - rule: 内存无记录时返回 404 + ErrorResponse（detail=Callback not found.），不返回空 200  # 来源：需求
  - rule: 成功返回后清除该 orderId 的回调记录，保证后续步骤可检测新回调  # 来源：需求

validationChecklist:  # 来源：需求
  - item: POST /callback 合法 OrderCallbackRequest 返回 200 + CallbackAckResponse（status=SUCCESS）  # 来源：需求
  - item: POST /callback 非法 payload 返回 400 + ErrorResponse  # 来源：需求
  - item: GET /callback/latest 非法 orderId UUID 返回 422 + ErrorResponse  # 来源：需求
  - item: GET /callback/latest 存在 orderId 返回 200 + OrderCallbackQueryResponse  # 来源：需求
  - item: GET /callback/latest 不存在 orderId 返回 404 + ErrorResponse（detail=Callback not found.）  # 来源：需求
  - item: GET /callback/latest 成功后再次查询同一 orderId 返回 404（记录已清除）  # 来源：需求
