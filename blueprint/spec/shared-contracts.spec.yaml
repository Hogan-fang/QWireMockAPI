specVersion: "2.0"  # 来源：元信息
service: shared_contracts  # 来源：元信息
status: ready  # 来源：元信息

documentRole:  # 来源：需求
  value: order_server 与 callback_server 的共享契约定义  # 来源：需求

sourceLegend:  # 来源：元信息
  requirement: 直接来自业务需求或用户补充规则  # 来源：元信息
  schema: 直接来自 blueprint/schema 下的 OpenAPI 定义  # 来源：元信息
  engineering: 为统一实现方式、日志和测试而增加的工程化约束  # 来源：元信息

contracts:  # 来源：需求
  naming:  # 来源：工程补充
    - rule: HTTP 请求与响应字段统一使用 camelCase  # 来源：工程补充
    - rule: 数据库表名与列名统一使用 snake_case  # 来源：工程补充

  statusModel:  # 来源：需求
    orderStatus:  # 来源：需求
      values:  # 来源：需求
        - SUCCESS  # 来源：需求
        - COMPLETED  # 来源：需求
        - FAIL  # 来源：需求
    productStatus:  # 来源：需求
      values:  # 来源：需求
        - PROCESSING  # 来源：需求
        - SHIPPED  # 来源：需求
        - DELIVERED  # 来源：需求
        - FAIL  # 来源：需求
    rule:  # 来源：需求
      value: 所有状态值必须使用大写字符串  # 来源：需求

  persistence:  # 来源：需求
    order:  # 来源：需求
      value: 订单主数据与商品明细必须做 DB 持久化  # 来源：需求
    callback:  # 来源：需求
      value: callback 数据仅保存在内存与日志中，不做 DB 持久化  # 来源：需求

  privacy:  # 来源：需求
    - rule: cardNumber 在任何输出中都必须采用前 6 后 4 掩码  # 来源：需求
    - rule: cvv 与 expiry 不得出现在 OrderResponse、callback payload 或日志敏感字段中  # 来源：需求

  lifecycle:  # 来源：需求
    - rule: 订单创建成功后订单状态为 SUCCESS、商品状态为 PROCESSING  # 来源：需求
    - rule: 约 30 秒后商品状态推进为 SHIPPED  # 来源：需求
    - rule: 约 60 秒后商品状态推进为 DELIVERED  # 来源：需求
    - rule: 全部商品均为 DELIVERED 后订单状态推进为 COMPLETED  # 来源：需求

  callbackEvents:  # 来源：需求
    requiredEvents:  # 来源：需求
      - ORDER_SUCCESS  # 来源：需求
      - ORDER_SHIPPED  # 来源：需求
      - ORDER_DELIVERED  # 来源：需求
      - ORDER_COMPLETED  # 来源：需求

  errorHandling:  # 来源：需求
    - rule: 所有失败场景统一使用 FAIL  # 来源：需求
    - rule: 失败场景必须包含 failReason  # 来源：需求
    - rule: order_server 与 callback_server 查询接口中非法 UUID 均返回 422  # 来源：需求

  cardBusinessRules:  # 来源：需求
    - rule: cardNumber 以 4 开头时，POST /order 返回业务失败，failReason 为 `Card invalid`  # 来源：需求
    - rule: cardNumber 以 5 开头时，POST /order 返回业务失败，failReason 为 `Insufficient balance`  # 来源：需求
    - rule: 以上规则仅在 POST /order 的创建处理阶段生效，不适用于 GET /order 的查询阶段  # 来源：需求

  logging:  # 来源：工程补充
    - rule: 两个服务都要输出可阅读日志，至少包含 reference、orderId、status 和 callbackEvent  # 来源：工程补充
    - rule: callback 收到的数据需可被测试报告引用  # 来源：工程补充

validationChecklist:  # 来源：需求
  - item: 共享状态枚举与 schema / spec 保持一致 (source: requirement)  # 来源：需求
  - item: 掩码与敏感字段脱敏规则在两个服务中同时生效 (source: requirement)  # 来源：需求
  - item: 生命周期与 callback 事件在集成测试中可验证 (source: requirement)  # 来源：需求
