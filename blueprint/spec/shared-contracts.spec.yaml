specVersion: "2.0"
service: shared_contracts
status: ready

documentRole:
  value: order_server 与 callback_server 的共享契约定义
  source: requirement

sourceLegend:
  requirement: 直接来自业务需求或用户补充规则
  schema: 直接来自 blueprint/schema 下的 OpenAPI 定义
  engineering: 为统一实现方式、日志和测试而增加的工程化约束

contracts:
  naming:
    - rule: HTTP 请求与响应字段统一使用 camelCase
      source: engineering
    - rule: 数据库表名与列名统一使用 snake_case
      source: engineering

  statusModel:
    orderStatus:
      values:
        - SUCCESS
        - COMPLETED
        - FAIL
      source: requirement
    productStatus:
      values:
        - PROCESSING
        - SHIPPED
        - DELIVERED
        - FAIL
      source: requirement
    rule:
      value: 所有状态值必须使用大写字符串
      source: requirement

  persistence:
    order:
      value: 订单主数据与商品明细必须做 DB 持久化
      source: requirement
    callback:
      value: callback 数据仅保存在内存与日志中，不做 DB 持久化
      source: requirement

  privacy:
    - rule: cardNumber 在任何输出中都必须采用前 6 后 4 掩码
      source: requirement
    - rule: cvv 与 expiry 不得出现在 OrderResponse、callback payload 或日志敏感字段中
      source: requirement

  lifecycle:
    - rule: 订单创建成功后订单状态为 SUCCESS、商品状态为 PROCESSING
      source: requirement
    - rule: 约 30 秒后商品状态推进为 SHIPPED
      source: requirement
    - rule: 约 60 秒后商品状态推进为 DELIVERED
      source: requirement
    - rule: 全部商品均为 DELIVERED 后订单状态推进为 COMPLETED
      source: requirement

  callbackEvents:
    requiredEvents:
      - ORDER_SUCCESS
      - ORDER_SHIPPED
      - ORDER_DELIVERED
      - ORDER_COMPLETED
    source: requirement

  errorHandling:
    - rule: 所有失败场景统一使用 FAIL
      source: requirement
    - rule: 失败场景必须包含 failReason
      source: requirement
    - rule: order 查询非法 UUID 返回 400，callback 查询非法 UUID 返回 422
      source: requirement

  logging:
    - rule: 两个服务都要输出可阅读日志，至少包含 reference、orderId、status 和 callbackEvent
      source: engineering
    - rule: callback 收到的数据需可被测试报告引用
      source: engineering

validationChecklist:
  - item: 共享状态枚举与 schema / spec 保持一致
    source: requirement
  - item: 掩码与敏感字段脱敏规则在两个服务中同时生效
    source: requirement
  - item: 生命周期与 callback 事件在集成测试中可验证
    source: requirement
