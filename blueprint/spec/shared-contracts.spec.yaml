specVersion: "1.0"
service: "shared-contracts"
status: "draft"

purpose:
  - "定义 order-server 与 callback-server 共享的契约规则"
  - "统一命名、状态、时间与日志约束"
  - "作为 schema 与实现之间的公共语义补充层"

contracts:
  naming:
    - "HTTP 请求与响应字段统一使用 camelCase"
    - "数据库表名与列名统一使用 snake_case"
    - "跨层命名差异必须在实现层显式转换"

  status:
    - "所有订单状态和商品状态均使用大写字符串"
    - "订单状态允许值：SUCCESS、COMPLETED、FAIL"
    - "商品状态允许值：PROCESSING、SHIPPED、DELIVERED、FAIL"

  persistence:
    - "订单主数据必须持久化到数据库"
    - "订单商品数据必须持久化到数据库"
    - "回调记录默认输出到日志，不要求数据库持久化"

  masking:
    - "响应中的 cardNumber 必须为前6后4掩码格式"
    - "CVV 与 expiry 不得出现在订单响应和回调响应中"

  timing:
    - "订单创建成功后应立即触发 ORDER_SUCCESS 回调"
    - "订单创建后约30秒，商品状态推进为 SHIPPED"
    - "订单创建后约60秒，商品状态推进为 DELIVERED"
    - "全部商品 DELIVERED 后，订单状态推进为 COMPLETED"

  callback:
    - "回调事件类型至少包括 ORDER_SUCCESS、ORDER_SHIPPED、ORDER_DELIVERED、ORDER_COMPLETED"
    - "回调请求与响应需记录到可阅读日志"

  errorHandling:
    - "所有失败响应状态统一为 FAIL"
    - "失败原因字段统一使用 failReason"
    - "reference 非法时应返回明确错误信息"

testScenarios:
  - "共享状态值与 schema 枚举保持一致"
  - "共享掩码规则被 order-server 与 callback-server 同时满足"
  - "共享时序规则在集成测试中可验证"
