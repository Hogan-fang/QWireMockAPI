specVersion: "2.0"
service: callback_server
status: ready

documentRole:
  value: callback_server 行为规格，供 schema、实现代码和测试样例生成使用
  source: requirement

sourceLegend:
  requirement: 直接来自业务需求或用户补充规则
  schema: 直接来自 blueprint/schema/callback_server.yaml
  guideline: 直接来自 QWireGuideline/guideline/project-guideline.md
  engineering: 为便于实现、测试与日志审计而增加的工程化设计

apiContract:
  receiveCallback:
    endpoint: POST /callback
    source: schema
    requestModel:
      value: OrderResponse
      source: requirement
    responses:
      - statusCode: 200
        when: 请求体通过校验
        action:
          - 将数据写入内存缓存
          - 将请求内容写入日志
        responseModel: Received
        source: requirement
      - statusCode: 400
        when: 请求体不符合 OrderResponse 或缺少关键字段
        responseModel: HttpErrorResponse
        codeDetailOnly: true
        source: guideline

  checkCallback:
    endpoint: GET /check?reference={uuid}
    source: schema
    responses:
      - statusCode: 200
        when: reference 为合法 UUID 且内存中存在记录
        responseModel: OrderResponse
        source: requirement
      - statusCode: 404
        when: reference 为合法 UUID 但不存在记录
        responseModel: HttpErrorResponse
        codeDetailOnly: true
        source: guideline
      - statusCode: 422
        when: reference 不是合法 UUID
        responseModel: HttpErrorResponse
        codeDetailOnly: true
        source: guideline

storagePolicy:
  callbackCache:
    value: callback 数据仅保存在内存中
    source: requirement
  persistence:
    value: 不做 DB 持久化
    source: requirement
  logging:
    value: 收到的 callback 数据和查询结果都需输出到可阅读日志中
    source: requirement

payloadRules:
  - rule: callback 数据结构必须符合 OrderResponse
    source: requirement
  - rule: cardNumber 应保持掩码格式，且不得包含 cvv 与 expiry
    source: requirement
  - rule: status 字段使用大写字符串，与 order_server 保持一致
    source: requirement
  - rule: HTTP 错误响应仅返回通用 `code + detail`，不得返回内部校验明细或 `errors` 字段
    source: guideline

interactionRules:
  - rule: POST 校验成功后先写内存，再返回 200
    source: requirement
  - rule: GET /check 仅按 reference 从内存查询，不访问 DB
    source: requirement
  - rule: 内存无记录时返回 404，不返回空 200
    source: requirement

validationChecklist:
  - item: POST /callback 合法 OrderResponse 返回 200 + Received
    source: requirement
  - item: POST /callback 非法 payload 返回 400 + ValidationErrorResponse
    source: requirement
  - item: GET /check 非法 UUID 返回 422
    source: requirement
  - item: GET /check 存在 reference 返回 200 + OrderResponse
    source: requirement
  - item: GET /check 不存在 reference 返回 404
    source: requirement
