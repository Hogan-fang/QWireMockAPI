specVersion: "2.0"  # 来源：元信息
service: callback_server  # 来源：元信息
status: ready  # 来源：元信息

documentRole:  # 来源：需求
  value: callback_server 行为规格，供 schema、实现代码和测试样例生成使用  # 来源：需求

sourceLegend:  # 来源：元信息
  requirement: 直接来自业务需求或用户补充规则  # 来源：元信息
  schema: 直接来自 blueprint/schema/callback_server.yaml  # 来源：元信息
  guideline: 直接来自 QWireGuideline/guideline/project-guideline.md  # 来源：元信息
  engineering: 为便于实现、测试与日志审计而增加的工程化设计  # 来源：元信息


apiContract:  # 来源：schema
  receiveCallback:  # 来源：schema
    endpoint: POST /callback  # 来源：schema
    requestModel:  # 来源：schema
      value: OrderResponse  # 来源：schema
    responses:  # 来源：schema
      - statusCode: 200  # 来源：需求
        when: 请求体通过校验  # 来源：需求
        action:  # 来源：需求
          - 将数据写入内存缓存  # 来源：需求
          - 将请求内容写入日志  # 来源：需求
        responseModel: Received  # 来源：需求
      - statusCode: 400  # 来源：guideline
        when: 请求体不符合 OrderResponse 或缺少关键字段  # 来源：guideline
        responseModel: HttpErrorResponse  # 来源：guideline
        codeDetailOnly: true  # 来源：guideline

  checkCallback:  # 来源：schema
    endpoint: GET /check?reference={uuid}  # 来源：schema
    responses:  # 来源：schema
      - statusCode: 200  # 来源：需求
        when: reference 为合法 UUID 且内存中存在记录  # 来源：需求
        responseModel: OrderResponse  # 来源：需求
      - statusCode: 404  # 来源：guideline
        when: reference 为合法 UUID 但不存在记录  # 来源：guideline
        responseModel: HttpErrorResponse  # 来源：guideline
        codeDetailOnly: true  # 来源：guideline
      - statusCode: 422  # 来源：guideline
        when: reference 不是合法 UUID  # 来源：guideline
        responseModel: HttpErrorResponse  # 来源：guideline
        codeDetailOnly: true  # 来源：guideline

storagePolicy:  # 来源：需求
  callbackCache:  # 来源：需求
    value: callback 数据仅保存在内存中  # 来源：需求
  persistence:  # 来源：需求
    value: 不做 DB 持久化  # 来源：需求
  logging:  # 来源：需求
    value: 收到的 callback 数据和查询结果都需输出到可阅读日志中  # 来源：需求

payloadRules:  # 来源：需求
  - rule: callback 数据结构必须符合 OrderResponse  # 来源：需求
  - rule: cardNumber 应保持掩码格式，且不得包含 cvv 与 expiry  # 来源：需求
  - rule: status 字段使用大写字符串，与 order_server 保持一致  # 来源：需求
  - rule: HTTP 错误响应仅返回通用 `code + detail`，不得返回内部校验明细或 `errors` 字段  # 来源：guideline

interactionRules:  # 来源：需求
  - rule: POST 校验成功后先写内存，再返回 200  # 来源：需求
  - rule: GET /check 仅按 reference 从内存查询，不访问 DB  # 来源：需求
  - rule: 内存无记录时返回 404，不返回空 200  # 来源：需求

validationChecklist:  # 来源：需求
  - item: POST /callback 合法 OrderResponse 返回 200 + Received  # 来源：需求
  - item: POST /callback 非法 payload 返回 400 + HttpErrorResponse  # 来源：需求
  - item: GET /check 非法 UUID 返回 422  # 来源：需求
  - item: GET /check 存在 reference 返回 200 + OrderResponse  # 来源：需求
  - item: GET /check 不存在 reference 返回 404  # 来源：需求
