openapi: 3.0.0

info:
  title: QWire Order API v2
  version: "2.0.0"
  description: Order create and status query API
  contact:
    email: you@your-company.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://127.0.0.1:9100
    description: Local order server

paths:

  /order:
    get:
      summary: Search order
      operationId: searchOrder
      description: Search order by reference
      parameters:
        - in: query
          name: reference
          description: Order reference (UUID)
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          $ref: '#/components/responses/OrderQuerySuccessResponse'
        '422':
          $ref: '#/components/responses/InvalidReferenceResponse'
        '404':
          $ref: '#/components/responses/OrderNotFoundResponse'

    post:
      summary: Create order
      operationId: createOrder
      description: Add a new order to the system
      requestBody:
        description: Order to create
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
      responses:
        '201':
          $ref: '#/components/responses/OrderCreateSuccessResponse'
        '400':
          $ref: '#/components/responses/OrderBusinessFailure400Response'
        '409':
          $ref: '#/components/responses/OrderConflictResponse'
        '422':
          $ref: '#/components/responses/InvalidOrderRequestResponse'

components:

  responses:
    OrderCreateSuccessResponse:
      description: Order created
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OrderResponse'
          example:
            reference: d290f1ee-6c54-4b01-90e6-d701748f0851
            orderId: PX39280930012
            name: Widget Adapter Order
            mid: M123456789
            orderDate: 2024-01-10T10:15:30Z
            amount: 99.99
            currency: USD
            status: SUCCESS
            cardNumber: 622222******2222
            products:
              - productId: 29838-02
                count: 2
                spec: xs-83
                status: PROCESSING

    OrderBusinessFailure400Response:
      description: Business failure response. The specific failReason values are defined in the service spec.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OrderBusinessFailureResponse'
          examples:
            cardInvalid:
              summary: Card invalid
              value:
                reference: d290f1ee-6c54-4b01-90e6-d701748f0851
                orderId: PX39280930013
                name: Widget Adapter Order
                mid: M123456789
                orderDate: 2024-01-10T10:15:30Z
                amount: 99.99
                currency: USD
                status: FAIL
                failReason: Card invalid
                cardNumber: 411111******1111
                products:
                  - productId: 29838-02
                    count: 2
                    spec: xs-83
                    status: FAIL
            insufficientBalance:
              summary: Insufficient balance
              value:
                reference: e390f1ee-6c54-4b01-90e6-d701748f0852
                orderId: PX39280930014
                name: Widget Adapter Order
                mid: M123456789
                orderDate: 2024-01-10T10:15:30Z
                amount: 188.88
                currency: USD
                status: FAIL
                failReason: Insufficient balance
                cardNumber: 522222******2222
                products:
                  - productId: 29838-03
                    count: 1
                    spec: m-10
                    status: FAIL

    OrderConflictResponse:
      description: Duplicate reference or request conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HttpErrorResponse'
          example:
            code: order_conflict
            detail: Order already exists

    InvalidOrderRequestResponse:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HttpErrorResponse'
          example:
            code: invalid_request
            detail: Request validation failed

    OrderQuerySuccessResponse:
      description: Order found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OrderResponse'
          example:
            reference: d290f1ee-6c54-4b01-90e6-d701748f0851
            orderId: PX39280930012
            name: Widget Adapter Order
            mid: M123456789
            orderDate: 2024-01-10T10:15:30Z
            amount: 99.99
            currency: USD
            status: COMPLETED
            cardNumber: 622222******2222
            products:
              - productId: 29838-02
                count: 2
                spec: xs-83
                status: DELIVERED

    InvalidReferenceResponse:
      description: Invalid reference (e.g. not a valid UUID)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HttpErrorResponse'
          example:
            code: invalid_reference
            detail: invalid UUID string

    OrderNotFoundResponse:
      description: Order not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HttpErrorResponse'
          example:
            code: order_not_found
            detail: Order not found

  schemas:

    # =========================
    # Order Schemas
    # =========================

    OrderRequest:
      type: object
      required:
        - reference
        - name
        - products
        - callback
        - mid
        - signature
        - cardNumber
        - cvv
        - expiry
        - amount
        - currency
      properties:
        reference:
          type: string
          format: uuid
          example: d290f1ee-6c54-4b01-90e6-d701748f0851
        name:
          type: string
          example: Widget Adapter Order
        callback:
          type: string
          format: uri
          example: http://www.xxx.com
        mid:
          type: string
          description: Merchant ID
          maxLength: 10
          example: "M123456789"
        signature:
          type: string
          description: Request signature
          example: "8f14e45fceea167a5a36dedd4bea2543"
        cardNumber:
          type: string
          description: Card number
          example: "6222222222222222"
        cvv:
          type: string
          description: CVV
          example: "123"
        expiry:
          type: string
          description: Expiry date, e.g. MM/YY
          example: "12/28"
        amount:
          type: number
          format: double
          description: Amount
          example: 99.99
        currency:
          type: string
          description: Currency, e.g. USD, CNY
          example: "USD"
        products:
          type: array
          items:
            $ref: '#/components/schemas/ProductRequest'


    OrderResponse:
      type: object
      description: Query result returns a masked card number (first 6 and last 4 visible), without CVV and expiry
      required:
        - reference
        - orderId
        - name
        - mid
        - orderDate
        - amount
        - currency
        - status
        - cardNumber
        - products
      properties:
        reference:
          type: string
          format: uuid
          example: d290f1ee-6c54-4b01-90e6-d701748f0851
        orderId:
          type: string
          format: string
          example: PX39280930012
        name:
          type: string
          example: Widget Adapter Order
        mid:
          type: string
          description: Merchant ID
          maxLength: 10
          example: "M123456789"
        orderDate:
          type: string
          format: date-time
          example: 2024-01-10T10:15:30Z
        amount:
          type: number
          format: double
          description: Amount
          example: 99.99
        currency:
          type: string
          description: Currency
          example: "USD"
        status:
          type: string
          description: Order status (uppercase)
          enum: [SUCCESS, COMPLETED, FAIL]
          example: SUCCESS
        failReason:
          type: string
          description: Failure reason, required and non-empty when status is FAIL
          minLength: 1
        cardNumber:
          type: string
          description: Masked card number (first 6 and last 4 visible)
          pattern: '^\d{6}\*{6}\d{4}$'
          example: "622222******2222"
        products:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponse'
      oneOf:
        - description: Success response must not contain failReason
          required:
            - status
          properties:
            status:
              enum: [SUCCESS, COMPLETED]
          not:
            required:
              - failReason
        - description: Fail response must contain non-empty failReason
          required:
            - status
            - failReason
          properties:
            status:
              enum: [FAIL]


    HttpErrorResponse:
      type: object
      description: Standard public HTTP error payload. Only generic `code + detail` is returned; internal validation details or debug information must not be exposed.
      required:
        - code
        - detail
      properties:
        code:
          type: string
          description: Public machine-readable error code. Known values in this service include `order_conflict`, `invalid_request`, `invalid_reference`, and `order_not_found`.
          example: invalid_request
        detail:
          type: string
          description: Public human-readable error summary.
          example: Request validation failed

    OrderBusinessFailureResponse:
      type: object
      required:
        - status
        - failReason
      properties:
        status:
          type: string
          enum: [FAIL]
          example: FAIL
        failReason:
          type: string
          description: Business failure reason. Specific values are defined in the service spec.
          example: "Card invalid"
        reference:
          type: string
          format: uuid
        orderId:
          type: string
        name:
          type: string
        mid:
          type: string
          maxLength: 10
        orderDate:
          type: string
          format: date-time
        amount:
          type: number
        currency:
          type: string
        products:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponse'
        cardNumber:
          type: string
          description: May be returned only for business failure responses that still expose masked card data
          pattern: '^\d{6}\*{6}\d{4}$'


    # =========================
    # Product Schemas
    # =========================

    ProductBase:
      type: object
      required:
        - productId
        - count
        - spec
      properties:
        productId:
          type: string
          example: 29838-02
        count:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          example: 2
        spec:
          type: string
          example: xs-83

    ProductRequest:
      allOf:
        - $ref: '#/components/schemas/ProductBase'

    ProductResponse:
      allOf:
        - $ref: '#/components/schemas/ProductBase'
        - type: object
          properties:
            status:
              type: string
              description: Product status (uppercase)
              enum: [PROCESSING, SHIPPED, DELIVERED, FAIL]
              example: SHIPPED
