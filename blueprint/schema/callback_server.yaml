openapi: 3.0.0

info:
  title: QWire Callback API v2
  version: "2.1.0"
  description: Callback receiving API with relay query behavior for test projects
  contact:
    email: you@your-company.com

servers:
  - url: http://127.0.0.1:8100

paths:
  /check:
    get:
      summary: Get callback data by reference
      operationId: check
      description: Retrieve cached callback data by order reference
      parameters:
        - in: query
          name: reference
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Callback data found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'

        '404':
          description: Callback data not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'

        '422':
          description: Invalid UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetailResponse'

  /callback:
    post:
      summary: Order status callback
      operationId: callback
      description: Receive callback from order system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderResponse'
      responses:
        '200':
          description: Received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Received'

        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

components:
  schemas:

    Received:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: OK

    ErrorDetailResponse:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          example: Callback data not found

    ValidationErrorResponse:
      type: object
      required:
        - message
        - errors
      properties:
        message:
          type: string
          example: Invalid order payload
        errors:
          type: array
          items:
            type: object
            additionalProperties: true

    OrderResponse:
      type: object
      required:
        - reference
        - orderId
        - name
        - mid
        - orderDate
        - amount
        - currency
        - status
        - cardNumber
        - products
      properties:
        reference:
          type: string
          format: uuid
        orderId:
          type: string
        name:
          type: string
        mid:
          type: string
        orderDate:
          type: string
          format: date-time
        amount:
          type: number
        currency:
          type: string
        status:
          type: string
          enum: [SUCCESS, COMPLETED, FAIL]
        failReason:
          type: string
          nullable: true
        cardNumber:
          type: string
        products:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponse'

    ProductBase:
      type: object
      required:
        - productId
        - count
        - spec
      properties:
        productId:
          type: string
        count:
          type: integer
        spec:
          type: string

    ProductResponse:
      allOf:
        - $ref: '#/components/schemas/ProductBase'
        - type: object
          properties:
            status:
              type: string
              enum: [PROCESSING, SHIPPED, DELIVERED, FAIL]
