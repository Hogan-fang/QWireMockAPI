openapi: 3.0.3

info:
  title: QWireMockAPI Merchant Service API
  version: "3.0.0"
  description: |
    Mock merchant service used to receive payment platform callbacks and expose
    the most recent callback per order for QWireCore callback checking.

servers:
  - url: http://127.0.0.1:8100
    description: Local mock merchant service

paths:
  /callback:
    post:
      summary: Receive order callback
      operationId: receiveOrderCallback
      description: |
        Receive order status change callback from the mock order service and
        store it in memory for later inspection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCallbackRequest'
      responses:
        '200':
          description: Callback received successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallbackAckResponse'
        '400':
          description: Invalid callback request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /callback/latest:
    get:
      summary: Query most recent callback
      operationId: getLatestCallback
      description: |
        Return the latest callback received for the specified orderId. After the
        callback is queried successfully, the in-memory record may be cleared so
        later checks can detect duplicate callbacks.
      parameters:
        - in: query
          name: orderId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Latest callback found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCallbackQueryResponse'
        '404':
          description: Callback not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                detail: Callback not found.
        '422':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                detail: Invalid request

components:
  schemas:
    ErrorResponse:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          example: Callback not found.

    CallbackAckResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [SUCCESS]
          example: SUCCESS

    OrderCallbackRequest:
      type: object
      required:
        - orderId
        - reference
        - merchantId
        - paymentStatus
        - orderStatus
        - finishTime
      properties:
        orderId:
          type: string
          format: uuid
        reference:
          type: string
        merchantId:
          type: string
        paymentStatus:
          type: string
          enum: [PROCESSING, PAID, FAILED, TIMEOUT]
        orderStatus:
          type: string
          enum: [PROCESSING, DELIVERED]
        finishTime:
          type: string
          format: date-time

    OrderCallbackQueryResponse:
      type: object
      required:
        - callbackId
        - callbackTime
        - orderId
        - reference
        - merchantId
        - paymentStatus
        - orderStatus
      properties:
        callbackId:
          type: string
          format: uuid
        callbackTime:
          type: string
          format: date-time
        orderId:
          type: string
          format: uuid
        reference:
          type: string
        merchantId:
          type: string
        paymentStatus:
          type: string
          enum: [PROCESSING, PAID, FAILED, TIMEOUT]
        orderStatus:
          type: string
          enum: [PROCESSING, DELIVERED]
